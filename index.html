<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Clock</title>
</head>

<body>
    <div class="content">
        <div class="container">
            <h1>Clock</h1>
            <div class="clock">
                <div class="hour"></div>
                <div class="minute"></div>
                <div class="second"></div>
                <div class="center"></div>
            </div>
        </div>
        <div class="container">
            <h1>Interactive Card</h1>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fGlwaG9uZXxlbnwwfHwwfHx8MA%3D%3D"
                    alt="Card Image">
                <p>iPhone 13 Pro Max - Powerful performance & pro camera</p>
                <h2>IPhone 13 Pro Max</h2>
                <button>Buy Now</button>
            </div>
        </div>
        <div class="container">
            <h1>Loading Animation</h1>
            <div class="loading-animation">
                <div class="load">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
